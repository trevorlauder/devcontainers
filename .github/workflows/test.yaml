name: "CI - Test Features"
on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-autogenerated:
    name: Test Autogenerated
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read # checkout repository
    strategy:
      matrix:
        features:
          - base
          - ansible
          - aws
          - python
        baseImage:
          - debian:trixie
          - mcr.microsoft.com/devcontainers/base:trixie
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: "Generate GitHub App Token"
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        id: app-token
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: "Login to GitHub Container Registry"
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ steps.app-token.outputs.token }}

      - name: "Install latest devcontainer CLI"
        run: npm install -g @devcontainers/cli

      - name: "Generating tests for '${{ matrix.features }}' against '${{ matrix.baseImage }}'"
        env:
          FEATURES: ${{ matrix.features }}
          BASE_IMAGE: ${{ matrix.baseImage }}
        run: devcontainer features test --skip-scenarios -f "${FEATURES}" -i "${BASE_IMAGE}" .

  test-scenarios:
    name: Test Scenarios
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read # checkout repository
    strategy:
      matrix:
        features:
          - base
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: "Generate GitHub App Token"
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        id: app-token
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: "Login to GitHub Container Registry"
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ steps.app-token.outputs.token }}

      - name: "Install latest devcontainer CLI"
        run: npm install -g @devcontainers/cli

      - name: "Generating tests for '${{ matrix.features }}' scenarios"
        env:
          FEATURES: ${{ matrix.features }}
        run: devcontainer features test -f "${FEATURES}" --skip-autogenerated --skip-duplicated .

  test-global:
    name: Test Global
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read # checkout repository
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: "Install latest devcontainer CLI"
        run: npm install -g @devcontainers/cli

      - name: "Testing global scenarios"
        run: devcontainer features test --global-scenarios-only .
