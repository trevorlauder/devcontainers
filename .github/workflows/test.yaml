name: "CI - Test Features"
on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-autogenerated:
    name: Test Autogenerated
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read # checkout repository
    strategy:
      matrix:
        features:
          - base
          - ansible
          - aws
          - python
        baseImage:
          - debian:trixie
          - mcr.microsoft.com/devcontainers/base:trixie
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: "Install latest devcontainer CLI"
        run: npm install -g @devcontainers/cli

      - name: "Generating tests for '${{ matrix.features }}' against '${{ matrix.baseImage }}'"
        env:
          FEATURES: ${{ matrix.features }}
          BASE_IMAGE: ${{ matrix.baseImage }}
        run: devcontainer features test --skip-scenarios -f "${FEATURES}" -i "${BASE_IMAGE}" .

  test-scenarios:
    name: Test Scenarios
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read # checkout repository
    strategy:
      matrix:
        features:
          - base
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: "Install latest devcontainer CLI"
        run: npm install -g @devcontainers/cli

      - name: "Generating tests for '${{ matrix.features }}' scenarios"
        env:
          FEATURES: ${{ matrix.features }}
        run: devcontainer features test -f "${FEATURES}" --skip-autogenerated --skip-duplicated .

  test-global:
    name: Test Global
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read # checkout repository
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: "Install latest devcontainer CLI"
        run: npm install -g @devcontainers/cli

      - name: "Testing global scenarios"
        run: devcontainer features test --global-scenarios-only .
